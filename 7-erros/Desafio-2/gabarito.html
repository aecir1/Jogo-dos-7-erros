<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito 2 - Portal de Autenticação</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .login-box {
            background: #ffffff;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .title { color: #333; font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 500; color: #666; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #4ecdc4; }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover { background: #fa5252; }
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="title">Acessar Sistema</h1>
        <form id="auth-form">
            <div class="input-group">
                <label for="email">E-mail corporativo</label>
                <input type="email" id="email" placeholder="nome@empresa.com" required>
            </div>
            <div class="input-group">
                <label for="password">Senha secreta (talvez não tão secreta)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Entrar na Nave</button>
            <p class="error-message" id="error-msg">Preencha todos os campos!</p>
        </form>
    </div>
    <script>
        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('error-msg');
            
            if (!email || !password) {
                errorElement.style.display = 'block';
            } else {
                errorElement.style.display = 'none';
                alert('Acesso concedido. Bem-vindo!');
            }
        });
    </script>
</body>
</html>
