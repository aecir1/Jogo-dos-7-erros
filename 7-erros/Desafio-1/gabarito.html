<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito 1 - Perfil Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00ffcc;
            margin-bottom: 20px;
        }
        .name { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .role { font-size: 14px; font-weight: 600; color: #00ffcc; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .bio { font-size: 15px; line-height: 1.5; color: #ccc; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            color: #1e1e2f;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s, transform 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.pinimg.com/736x/29/a9/5f/29a95f5794d91bea4336a6fa71c1b21c.jpg" alt="Avatar do usuário" class="avatar">
        <h1 class="name">Gaguinho Jr</h1>
        <h2 class="role">Front-end Hacker</h2>
        <p class="bio">soluções do dog.</p>
        <button class="btn" id="action-btn">Conectar</button>
    </div>
    <script>
        document.getElementById('action-btn').addEventListener('click', () => {
            alert('Conexão estabelecida com sucesso!');
        });
    </script>
</body>
</html>
